openapi: 3.0.3
info:
  title: Offroad API
  description: API REST para la app Offroad / Overlanding
  version: 1.0.0

servers:
  - url: http://localhost:8000/api/v1
    description: Local

paths:
  /health:
    get:
      summary: Health check
      tags: [System]
      responses:
        '200':
          description: OK

  /auth/register:
    post:
      summary: Registrar usuario
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password, password_confirmation]
              properties:
                name: { type: string }
                email: { type: string, format: email }
                password: { type: string, minLength: 8 }
                password_confirmation: { type: string }
                account_type:
                  type: string
                  enum: [user, workshop_owner]
                  description: Tipo de cuenta. Por defecto user.
      responses:
        '201':
          description: Usuario creado

  /auth/login:
    post:
      summary: Iniciar sesion
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string }
      responses:
        '200':
          description: Login exitoso

  /auth/logout:
    post:
      summary: Cerrar sesion
      tags: [Auth]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Sesion cerrada

  /auth/me:
    get:
      summary: Perfil del usuario autenticado
      tags: [Auth]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Perfil

  /me/become-workshop-owner:
    post:
      summary: Convertir cuenta de usuario a dueño de taller
      tags: [Profile]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Rol actualizado a workshop_owner

  /admin/users/{id}/role:
    patch:
      summary: Cambiar rol de un usuario (solo admin)
      tags: [Admin]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role]
              properties:
                role:
                  type: string
                  enum: [user, workshop_owner, admin]
      responses:
        '200':
          description: Rol actualizado

  /my/workshops:
    get:
      summary: Listar mis talleres
      tags: [My Workshops]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Lista de talleres del dueño
    post:
      summary: Crear mi taller
      tags: [My Workshops]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MyWorkshopInput'
      responses:
        '201':
          description: Taller creado (draft o pending_review)

  /my/workshops/{id}:
    get:
      summary: Ver mi taller
      tags: [My Workshops]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Detalle
    put:
      summary: Actualizar mi taller
      tags: [My Workshops]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MyWorkshopInput'
      responses:
        '200':
          description: Actualizado

  /my/workshops/{id}/submit:
    post:
      summary: Enviar taller a revision
      tags: [My Workshops]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Enviado a pending_review

  /my/workshops/{id}/photo:
    post:
      summary: Subir o reemplazar foto principal (cover)
      tags: [My Workshops]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [photo]
              properties:
                photo:
                  type: string
                  format: binary
      responses:
        '200':
          description: Cover actualizada
        '422':
          description: Validacion o error de storage
    delete:
      summary: Eliminar foto principal
      tags: [My Workshops]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Cover eliminada

  /my/workshops/{id}/photos:
    post:
      summary: Agregar foto secundaria (max 3)
      tags: [My Workshops]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [photo]
              properties:
                photo:
                  type: string
                  format: binary
      responses:
        '201':
          description: Secundaria agregada
        '422':
          description: Ya hay 3 o archivo invalido

  /my/workshops/{id}/photos/{photoId}:
    delete:
      summary: Eliminar foto secundaria
      tags: [My Workshops]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
        - name: photoId
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Secundaria eliminada

  /workshops:
    get:
      summary: Directorio de talleres publicados
      tags: [Workshops]
      security:
        - bearerAuth: []
      parameters:
        - name: q
          in: query
          schema: { type: string }
        - name: city
          in: query
          schema: { type: string }
        - name: service
          in: query
          schema: { type: string }
      responses:
        '200':
          description: Lista de talleres published

  /workshops/{id}:
    get:
      summary: Ficha de taller
      tags: [Workshops]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Detalle (published, o propio si soy dueño/admin)
        '404':
          description: No visible

  /admin/workshops:
    get:
      summary: Listar todos los talleres (admin)
      tags: [Admin Workshops]
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [draft, pending_review, published, suspended]
        - name: q
          in: query
          schema: { type: string }
      responses:
        '200':
          description: Lista completa / cola de revision
    post:
      summary: Crear taller (admin)
      tags: [Admin Workshops]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminWorkshopInput'
      responses:
        '201':
          description: Creado

  /admin/workshops/{id}:
    get:
      summary: Ver taller (admin)
      tags: [Admin Workshops]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Detalle
    put:
      summary: Actualizar taller (admin)
      tags: [Admin Workshops]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminWorkshopInput'
      responses:
        '200':
          description: Actualizado
    delete:
      summary: Eliminar taller (admin)
      tags: [Admin Workshops]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '204':
          description: Eliminado

  /admin/workshops/{id}/status:
    patch:
      summary: Cambiar status / verified (admin)
      tags: [Admin Workshops]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [draft, pending_review, published, suspended]
                verified: { type: boolean }
                moderation_note:
                  type: string
                  description: Obligatorio al suspender (min. 5 caracteres). Se limpia al publicar.
      responses:
        '200':
          description: Estado actualizado
        '422':
          description: Validacion (ej. falta motivo al suspender)

  /vehicles:
    get:
      summary: Listar vehiculos del usuario
      tags: [Vehicles]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Lista de vehiculos
    post:
      summary: Crear vehiculo
      tags: [Vehicles]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VehicleInput'
      responses:
        '201':
          description: Vehiculo creado

  /vehicles/{id}:
    get:
      summary: Ver vehiculo
      tags: [Vehicles]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Detalle del vehiculo
    put:
      summary: Actualizar vehiculo
      tags: [Vehicles]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VehicleInput'
      responses:
        '200':
          description: Vehiculo actualizado
    delete:
      summary: Eliminar vehiculo
      tags: [Vehicles]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '204':
          description: Eliminado

  /vehicles/{vehicleId}/maintenance-records:
    get:
      summary: Listar mantenimientos de un vehiculo
      tags: [Maintenance]
      security:
        - bearerAuth: []
      parameters:
        - name: vehicleId
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Lista de registros
    post:
      summary: Crear registro de mantenimiento
      tags: [Maintenance]
      security:
        - bearerAuth: []
      parameters:
        - name: vehicleId
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MaintenanceInput'
      responses:
        '201':
          description: Registro creado

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Sanctum

  schemas:
    VehicleInput:
      type: object
      required: [make, model, year]
      properties:
        make: { type: string }
        model: { type: string }
        year: { type: integer }
        nickname: { type: string, nullable: true }
        vin: { type: string, nullable: true }
        odometer: { type: integer, nullable: true }
        photo_path: { type: string, nullable: true }

    MaintenanceInput:
      type: object
      required: [type, performed_at]
      properties:
        type: { type: string, example: oil_change }
        title: { type: string, nullable: true }
        performed_at: { type: string, format: date }
        odometer: { type: integer, nullable: true }
        cost: { type: number, format: float, nullable: true }
        notes: { type: string, nullable: true }

    MyWorkshopInput:
      type: object
      required: [name]
      properties:
        name: { type: string }
        description: { type: string, nullable: true }
        phone: { type: string, nullable: true }
        email: { type: string, format: email, nullable: true }
        website: { type: string, nullable: true }
        address: { type: string, nullable: true }
        city: { type: string, nullable: true }
        state: { type: string, nullable: true }
        country: { type: string, example: VE }
        latitude: { type: number, nullable: true }
        longitude: { type: number, nullable: true }
        services:
          type: array
          items: { type: string }
        schedule: { type: object, nullable: true }
        submit:
          type: boolean
          description: Si true (default), crea en pending_review; si false, draft

    AdminWorkshopInput:
      type: object
      required: [name]
      properties:
        owner_id: { type: integer, nullable: true }
        name: { type: string }
        description: { type: string, nullable: true }
        phone: { type: string, nullable: true }
        email: { type: string, format: email, nullable: true }
        website: { type: string, nullable: true }
        address: { type: string, nullable: true }
        city: { type: string, nullable: true }
        state: { type: string, nullable: true }
        country: { type: string, example: VE }
        latitude: { type: number, nullable: true }
        longitude: { type: number, nullable: true }
        services:
          type: array
          items: { type: string }
        schedule: { type: object, nullable: true }
        status:
          type: string
          enum: [draft, pending_review, published, suspended]
        verified: { type: boolean }
        moderation_note:
          type: string
          description: Usar en PATCH status; obligatorio al suspender

